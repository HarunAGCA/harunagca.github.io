<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #0a0a0a;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            perspective: 1000px;
            position: relative;
            overflow: hidden;
        }

        .construction-container {
            text-align: center;
            padding: 3rem;
            position: relative;
            z-index: 2;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 
                0 0 50px rgba(98, 193, 191, 0.3),
                0 0 100px rgba(98, 193, 191, 0.1),
                inset 0 0 40px rgba(98, 193, 191, 0.2);
            border: 1px solid rgba(98, 193, 191, 0.3);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.5s;
            width: 80%;
            max-width: 600px;
            margin: 20px;
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px #62c1bf;
            animation: neonPulse 1.5s infinite alternate;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .construction-icon {
            font-size: 4rem;
            color: #62c1bf;
            margin: 2rem 0;
            animation: rotate 4s linear infinite;
        }

        .message {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            margin: 1.5rem 0;
            line-height: 1.6;
        }

        @keyframes neonPulse {
            from {
                text-shadow: 0 0 10px #62c1bf, 0 0 20px #62c1bf;
            }
            to {
                text-shadow: 0 0 5px #62c1bf, 0 0 10px #62c1bf, 0 0 15px #62c1bf;
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
        }

        @media screen and (max-width: 768px) {
            .construction-container {
                width: 90%;
                padding: 2rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .construction-icon {
                font-size: 3rem;
            }

            .message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="networkCanvas"></canvas>
    <div class="construction-container">
        <h1>Under Construction</h1>
        <i class="fas fa-cog construction-icon"></i>
        <p class="message">We're working hard to bring you something amazing.<br>Please check back soon!</p>
    </div>

    <script>
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Point {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#62c1bf';
                ctx.fill();
            }
        }

        const points = [];
        const numPoints = 65;
        for (let i = 0; i < numPoints; i++) {
            points.push(new Point());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            points.forEach(point => {
                point.update();
                point.draw();
            });

            for (let i = 0; i < points.length; i++) {
                for (let j = i + 1; j < points.length; j++) {
                    const dx = points[i].x - points[j].x;
                    const dy = points[i].y - points[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 195) {
                        ctx.beginPath();
                        ctx.moveTo(points[i].x, points[i].y);
                        ctx.lineTo(points[j].x, points[j].y);
                        ctx.strokeStyle = `rgba(98, 193, 191, ${1 - distance/195})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
